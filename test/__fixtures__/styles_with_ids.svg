<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="my-gradient">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#0000ff"/>
    </linearGradient>
    <clipPath id='my-clip'>
      <circle cx="50" cy="50" r="40"/>
    </clipPath>
  </defs>
  <style>
    #my-gradient stop { stop-opacity: 0.8; }
    #my-clip circle { fill: url(#my-gradient); }
  </style>
  <rect width="100" height="100" clip-path="url(#my-clip)" fill="url(#my-gradient)"/>
</svg>
